_target_: experiments.tagging.wrappers.PlainGraphGPSWrapper
in_channels: null               # init_physics -> 7 + extra_scalars
out_channels: null              # init_physics -> num_outputs
use_amp: false
add_fourmomenta_backbone: false

net:
  _target_: experiments.baselines.graphgps.PlainGraphGPS
  _partial_: true
  input_dim: null               # supplied by the wrapper (= in_channels)
  num_classes: null             # supplied by the wrapper (= out_channels)

  # static kNN graph (built once, reused by every GPS layer)
  knn_k: 4
  knn_metric: deltaR            # 'deltaR' (eta-phi L2) or 'minkowski' (4-momenta)
  use_edge_attr: true           # Minkowski edge invariant log|(p_i+p_j)^2| in the messages
  use_fts_bn: true

  # interleaved GPS layers (local static-MPNN + torch-MHA, fused per layer)
  dim: 16
  num_layers: 2
  num_heads: 2
  ffn_ratio: 2                  # GraphGPS FFN inner width = 2 * dim
  dropout: 0.0
  attn_dropout: 0.0
  act: relu

  head_layers: 2
  for_inference: false

defaults:
  - framesnet: identity
