# agnostic default training hyperparameters for tagging
iterations: ???
batchsize: 512

# optimizer: default AdamW
optimizer: AdamW
betas: [.9, .999]
eps: 1e-8
weight_decay: 0

lr_factor_framesnet: 1
weight_decay_framesnet: 0

# LR: Default CosineAnnealingLR
lr: 1e-3
scheduler: CosineAnnealingLR
scheduler_scale: 1
cosanneal_eta_min: 0
reduceplateau_factor: 0.1
reduceplateau_patience: 50
onecycle_div_factor: 25
onecycle_pct_start: 0.3
# CosineAnnealingWarmup: linear warmup over warmup_pct_start of the schedule (from
# warmup_start_factor*lr up to lr), then cosine decay to cosanneal_eta_min
warmup_pct_start: 0.05
warmup_start_factor: 0.01

# es_patience=null -> no early *termination* (train the full iteration budget, so a late
# post-plateau improvement is not missed); es_load_best_model still reports the best
# validation checkpoint, so accuracy is never capped by stopping early.
es_patience: null
es_load_best_model: true

log_every_n_steps: 200
validate_every_n_steps: 5000
validate_every_n_epochs_min: null

log_grad_norm: true
clip_grad_norm_framesnet: null
clip_grad_norm: 1
clip_grad_value: null
max_grad_norm: null
