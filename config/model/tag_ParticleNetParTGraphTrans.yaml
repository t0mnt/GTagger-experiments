_target_: experiments.tagging.wrappers.ParticleNetParTGraphTransWrapper
in_channels: null               # init_physics -> 7 + extra_scalars
out_channels: null              # init_physics -> num_outputs
use_amp: false
add_fourmomenta_backbone: false

net:
  _target_: experiments.baselines.particlenettransformer.ParticleNetParTGraphTrans
  _partial_: true
  input_dim: null               # supplied by the wrapper (= in_channels)
  num_classes: null             # supplied by the wrapper (= out_channels)

  # ParticleNet (EdgeConv) graph backbone with LLoCa tensorial message-passing.
  # hidden_reps_list types each EdgeConv's input for the frame transport (matching the
  # lloca ParticleNet): layer 0 is null (pure scalars = input_dim, set by the wrapper),
  # deeper layers carry vectors (Nx1n) so geometry is communicated between frames. Each
  # rep's dim must equal the previous layer's output width (here 64, 128).
  conv_params: [[16, [64, 64, 64]], [16, [128, 128, 128]], [16, [256, 256, 256]]]
  hidden_reps_list: [null, "32x0n+8x1n", "64x0n+16x1n"]
  use_fusion: true
  use_fts_bn: true
  use_input_concat: true
  knn_metric: deltaR            # first-layer kNN: 'deltaR' (eta-phi L2) or 'minkowski' (4-momenta)

  # ParticleTransformer-style encoder with LLoCa tensorial attention (LLoCaAttention).
  # attn_reps is the per-head tensor representation; the transformer width is
  # embed_dim = attn_reps.dim * num_heads (here (8 + 2*4) * 8 = 128). It must carry >=1
  # vector (Nx1n) for the q/k/v frame transport to communicate geometric information.
  attn_reps: "8x0n+2x1n"
  num_heads: 8
  num_layers: 10
  block_params: null
  activation: gelu
  fc_params: []
  # The prepended class token rides in the covariant jet frame (computed by the wrapper
  # from the framesnet's global path) so the tensorial readout stays Lorentz-invariant.

  # pairwise Lorentz interaction features (from v as (px, py, pz, E)).
  # bias=true adds them as an additive attention bias; bias=false disables them.
  bias: true
  pair_input_dim: 4
  pair_extra_dim: 0
  pair_embed_dims: [64, 64, 64]
  remove_self_pair: false
  use_pre_activation_pair: true

  for_inference: false

defaults:
  - framesnet: identity
