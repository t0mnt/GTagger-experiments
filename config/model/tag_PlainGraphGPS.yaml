_target_: experiments.tagging.wrappers.PlainGraphGPSWrapper
in_channels: null               # init_physics -> 7 + extra_scalars
out_channels: null              # init_physics -> num_outputs
use_amp: false
add_fourmomenta_backbone: false

net:
  _target_: experiments.baselines.plaingraphgps.PlainGraphGPS
  _partial_: true
  input_dim: null               # supplied by the wrapper (= in_channels)
  num_classes: null             # supplied by the wrapper (= out_channels)

  # static kNN graph (built once, reused by every GPS layer)
  knn_k: 16
  knn_metric: deltaR            # 'deltaR' (eta-phi L2) or 'minkowski' (4-momenta)
  use_fts_bn: true

  # GraphGPS ingredients, OFF by default so PlainGraphGPS vs PlainGraphTrans
  # isolates the interleaved-vs-sequential fusion (see the module docstring):
  use_edge_attr: false          # on -> Minkowski edge invariant log|(p_i+p_j)^2| in the messages
  use_rwse: false               # on -> Random-Walk Structural Encoding (PE/SE) on the kNN graph
  rwse_k: 16

  # interleaved GPS layers (local static-MPNN + torch-MHA, fused per layer)
  dim: 128
  num_layers: 10
  num_heads: 8
  ffn_ratio: 2                  # GraphGPS FFN inner width = 2 * dim
  dropout: 0.0
  attn_dropout: 0.0
  act: relu
  norm: batch                   # 'batch' (GraphGPS default, every config) or 'layer' (padding-safe ablation)

  head_layers: 2
  for_inference: false

defaults:
  - framesnet: identity
